services:

  inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: fire-detection-inference:latest
    container_name: fire-inference
    restart: unless-stopped
    ports:
      - "80:5000"
    volumes:
      - model_storage:/app/models
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/models/best.pt
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/model_status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  model_storage:
    driver: local
