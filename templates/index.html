<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Detection — AI Inference Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4500;
    --fire-amber: #FFA500;
    --safe: #00C896;
    --bg: #0A0A0B;
    --surface: #111114;
    --border: #222228;
    --text: #E8E8EC;
    --muted: #555560;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative; z-index: 1;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--fire);
    box-shadow: 0 0 12px var(--fire);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform: scale(1); }
    50% { opacity:0.5; transform: scale(0.8); }
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .lang-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid #3a3a45;
    background: #16161b;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }
  .lang-btn:hover { border-color: #55555f; background: #1e1e24; }

  .status-badge {
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s;
  }
  .status-badge.ready { border-color: var(--safe); color: var(--safe); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 40px;
    position: relative; z-index: 1;
  }

  .hero { margin-bottom: 60px; }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .hero h1 span.fire { color: var(--fire); }
  .hero p { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid > .card { min-width: 0; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    transition: border-color 0.2s;
    position: relative;
  }
  .card:hover { border-color: #333340; }

  .card.step-done { border-color: rgba(0,200,150,0.35); }
  .card.step-done .card-label { color: var(--safe); }
  .card.step-done .card-label::before { background: var(--safe); }
  .step-done-badge {
    display: none;
    position: absolute;
    top: 16px; right: 16px;
    font-size: 0.65rem;
    color: var(--safe);
    border: 1px solid rgba(0,200,150,0.4);
    border-radius: 20px;
    padding: 2px 10px;
    letter-spacing: 0.08em;
  }
  .card.step-done .step-done-badge { display: block; }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.3s;
  }
  .card-label::before {
    content: ''; display: block;
    width: 16px; height: 1px;
    background: var(--muted);
    transition: background 0.3s;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    display: block;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--fire);
    background: rgba(255,69,0,0.04);
  }
  .upload-zone.drag-reject {
    border-color: #ff4444;
    background: rgba(255,68,68,0.05);
  }

  #model-drop-zone {
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    text-align: center;
  }

  #image-drop-zone { padding: 4px; }

  .upload-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
  .upload-zone h3 { font-family: var(--display); font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
  .upload-zone p { font-size: 0.7rem; color: var(--muted); line-height: 1.5; }

  input[type="file"] { display: none; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 6px;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
    transition: all 0.15s; letter-spacing: 0.03em;
  }
  .btn-primary { background: var(--fire); color: #fff; border-color: var(--fire); }
  .btn-primary:hover:not(:disabled) { background: #e03d00; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-ghost:hover:not(:disabled) { border-color: #444; }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .btn-step {
    font-size: 0.58rem; color: var(--muted);
    border-right: 1px solid currentColor; padding-right: 8px; opacity: 0.6;
  }

  #model-status-bar {
    margin-top: 16px; padding: 10px 14px; border-radius: 6px;
    font-size: 0.72rem; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); color: var(--muted);
    transition: all 0.3s; display: none;
  }
  #model-status-bar.success { border-color: var(--safe); color: var(--safe); background: rgba(0,200,150,0.05); display: block; }
  #model-status-bar.error { border-color: var(--fire); color: #ff7755; background: rgba(255,69,0,0.05); display: block; }
  #model-status-bar.info { border-color: var(--border); color: var(--muted); display: block; }

  .error-banner {
    display: none;
    margin-top: 12px; padding: 10px 14px; border-radius: 6px;
    font-size: 0.72rem;
    border: 1px solid rgba(255,68,68,0.4);
    color: #ff7755;
    background: rgba(255,68,68,0.06);
  }
  .error-banner.visible { display: block; }

  #image-preview-box {
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
    background: #0d0d10; position: relative;
  }
  #image-preview-box img { width: 100%; height: 100%; object-fit: cover; }
  #image-placeholder { text-align: center; color: var(--muted); font-size: 0.72rem; line-height: 1.8; }
  #image-placeholder span { font-size: 2rem; display: block; margin-bottom: 8px; }

  #result-panel { display: none; margin-top: 20px; }
  #result-panel.visible { display: block; }

  .result-card {
    border-radius: 12px; padding: 30px; border: 1px solid var(--border);
    display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center;
  }
  .result-card.fire { background: rgba(255,69,0,0.06); border-color: rgba(255,69,0,0.3); }
  .result-card.non-fire { background: rgba(0,200,150,0.06); border-color: rgba(0,200,150,0.3); }
  .result-emoji { font-size: 3.5rem; line-height: 1; }
  .result-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 6px; }
  .result-class { font-family: var(--display); font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .result-card.fire .result-class { color: var(--fire); }
  .result-card.non-fire .result-class { color: var(--safe); }
  .result-conf { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }

  .prob-bars { display: flex; flex-direction: column; gap: 8px; }
  .prob-row { display: grid; grid-template-columns: 80px 1fr 52px; align-items: center; gap: 10px; font-size: 0.7rem; }
  .prob-name { color: var(--muted); }
  .prob-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prob-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
  .prob-fill.fire { background: var(--fire); }
  .prob-fill.non-fire { background: var(--safe); }
  .prob-value { text-align: right; color: var(--text); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    flex-shrink: 0;
  }
  .spinner.dark { border-color: rgba(0,0,0,0.15); border-top-color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }

  #console-log {
    background: #080809; border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 0.68rem; color: var(--muted);
    height: 120px; overflow-y: auto; margin-top: 20px; line-height: 1.8;
  }
  .log-line { display: flex; gap: 10px; }
  .log-time { color: #333340; flex-shrink: 0; }
  .log-line.success .log-msg { color: var(--safe); }
  .log-line.error .log-msg { color: #ff7755; }
  .log-line.info .log-msg { color: var(--muted); }

  @media (max-width: 700px) {
    header { padding: 16px 20px; }
    main { padding: 30px 20px; }
    .grid { grid-template-columns: 1fr; }
    .result-card { grid-template-columns: 1fr; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    FIRE DETECTION LAB
  </div>
  <div class="header-right">
    <button class="lang-btn" id="lang-btn">EN</button>
    <div class="status-badge" id="global-status">
      <div class="status-dot"></div>
      <span id="global-status-text" data-i18n="status.waiting">等待模型載入</span>
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <h1>AI <span class="fire">Fire</span> Detection<br><span data-i18n="hero.sub">推論測試平台</span></h1>
    <p>MobileNetV2 · PyTorch · Azure Inference Service</p>
  </div>

  <div class="grid">
    <div class="card" id="model-card">
      <div class="step-done-badge" data-i18n="badge.ready">✓ 已就緒</div>
      <div class="card-label" data-i18n="step1.label">Step 01 — 上傳模型</div>

      <label class="upload-zone" id="model-drop-zone" for="model-file-input">
        <span class="upload-icon">⚙️</span>
        <h3 data-i18n="step1.title">拖曳或點擊上傳 best.pt</h3>
        <p data-i18n="step1.desc" data-i18n-html>從 Google Colab 訓練完成後<br>導出的 MobileNetV2 權重檔案</p>
      </label>
      <input type="file" id="model-file-input" accept=".pt">

      <div id="model-status-bar"></div>

      <div class="btn-row">
        <button class="btn btn-ghost" id="upload-model-btn" disabled>
          <span class="btn-step">01</span>
          <div class="spinner dark" id="upload-spinner"></div>
          <span id="upload-label" data-i18n="btn.upload">📤 上傳模型</span>
        </button>
        <button class="btn btn-ghost" id="check-status-btn">
          <span class="btn-step">02</span>
          <span data-i18n="btn.check">🔍 檢查狀態</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-label" data-i18n="step2.label">Step 02 — 選擇測試圖片</div>

      <label class="upload-zone" id="image-drop-zone" for="image-file-input">
        <div id="image-preview-box">
          <div id="image-placeholder">
            <span>🖼️</span>
            <span data-i18n="step2.drop" data-i18n-html>拖曳或點擊上傳圖片<br>支援 JPG / PNG</span>
          </div>
          <img id="preview-img" style="display:none" alt="preview">
        </div>
      </label>
      <input type="file" id="image-file-input" accept="image/*">

      <div id="infer-error" class="error-banner" role="alert"></div>

      <div class="btn-row">
        <button class="btn btn-primary" id="infer-btn" disabled>
          <span class="btn-step">03</span>
          <div class="spinner" id="infer-spinner"></div>
          <span id="infer-label" data-i18n="btn.infer">🔥 開始推論</span>
        </button>
        <button class="btn btn-ghost" id="clear-btn" data-i18n="btn.clear">清除</button>
      </div>
    </div>
  </div>

  <div id="result-panel" role="region">
    <div class="card-label" data-i18n="result.title">推論結果</div>
    <div class="result-card" id="result-card">
      <div class="result-emoji" id="result-emoji">—</div>
      <div>
        <div class="result-label" data-i18n="result.classLabel">預測類別</div>
        <div class="result-class" id="result-class">—</div>
        <div class="result-conf" id="result-conf">—</div>
        <div class="prob-bars" id="prob-bars"></div>
      </div>
    </div>
  </div>

  <div id="console-log" role="log"></div>
</main>

<script>
  // ── i18n ──────────────────────────────────────────────────────────────────
  const I18N = {
    zh: {
      'status.waiting':  '等待模型載入',
      'status.ready':    '模型已就緒',
      'hero.sub':        '推論測試平台',
      'badge.ready':     '✓ 已就緒',
      'step1.label':     'Step 01 — 上傳模型',
      'step1.title':     '拖曳或點擊上傳 best.pt',
      'step1.desc':      '從 Google Colab 訓練完成後<br>導出的 MobileNetV2 權重檔案',
      'btn.upload':      '📤 上傳模型',
      'btn.check':       '🔍 檢查狀態',
      'btn.uploading':   '上傳中...',
      'step2.label':     'Step 02 — 選擇測試圖片',
      'step2.drop':      '拖曳或點擊上傳圖片<br>支援 JPG / PNG',
      'btn.infer':       '🔥 開始推論',
      'btn.inferring':   '推論中...',
      'btn.clear':       '清除',
      'result.title':    '推論結果',
      'result.classLabel': '預測類別',
      // dynamic — functions receive variables
      'log.init':        '系統初始化完成，請上傳 best.pt 或點擊「檢查狀態」',
      'log.cleared':     '已清除',
      'log.imgSelected': name => `已選擇圖片：${name}`,
      'log.wrongDrop':   '拖入的檔案格式不符',
      'log.fileErr':     '檔案格式錯誤，需要 .pt 檔案',
      'log.newDetected': '偵測到新模型檔案，請重新上傳以更新',
      'log.modelSel':    name => `選擇模型：${name}`,
      'log.uploadStart': '開始上傳模型...',
      'log.verifying':   '檔案上傳完成，正在驗證模型載入狀態...',
      'log.uploadFail':  msg => `上傳失敗：${msg}`,
      'log.uploadErr':   msg => `上傳錯誤：${msg}`,
      'log.verifyOk':    dev => `模型驗證通過，已就緒 (${dev})`,
      'log.verifyFail':  '模型未載入，請重新上傳',
      'log.connFail':    msg => `伺服器連線失敗：${msg}`,
      'log.checkQuery':  '查詢伺服器狀態...',
      'log.checkReady':  dev => `模型已就緒 (${dev})`,
      'log.checkNone':   '伺服器尚未載入模型',
      'log.inferSend':   '發送推論請求...',
      'log.inferDone':   (pred, conf) => `推論完成：${pred}（信心度 ${conf}%）`,
      'log.inferFail':   msg => `推論失敗：${msg}`,
      'log.netErr':      msg => `網路錯誤：${msg}`,
      'status.selected': (name, size) => `已選擇：${name} (${size} MB)，請點擊「上傳模型」`,
      'status.wrongType':'✗ 請選擇 .pt 格式的模型檔案',
      'status.loaded':   (dev, cls) => `✓ 模型已載入 | 裝置：${dev} | 類別：${cls}`,
      'status.verifyFail':'伺服器回報模型未載入，請重新上傳',
      'status.connFail': '✗ 無法連線至伺服器',
      'status.checkNone':'模型尚未載入，請上傳 best.pt',
      'infer.fail':      msg => `推論失敗：${msg}`,
      'infer.connFail':  '連線失敗，請確認伺服器正在運行',
      'result.conf':     val => `信心度：${val}%`,
    },
    en: {
      'status.waiting':  'Waiting for model',
      'status.ready':    'Model ready',
      'hero.sub':        'Inference Platform',
      'badge.ready':     '✓ Ready',
      'step1.label':     'Step 01 — Upload Model',
      'step1.title':     'Drag or click to upload best.pt',
      'step1.desc':      'Export MobileNetV2 weights<br>from your Google Colab training',
      'btn.upload':      '📤 Upload Model',
      'btn.check':       '🔍 Check Status',
      'btn.uploading':   'Uploading...',
      'step2.label':     'Step 02 — Select Test Image',
      'step2.drop':      'Drag or click to upload image<br>JPG / PNG supported',
      'btn.infer':       '🔥 Run Inference',
      'btn.inferring':   'Running...',
      'btn.clear':       'Clear',
      'result.title':    'Inference Result',
      'result.classLabel': 'Predicted Class',
      'log.init':        'Ready — upload best.pt or click Check Status',
      'log.cleared':     'Cleared',
      'log.imgSelected': name => `Image selected: ${name}`,
      'log.wrongDrop':   'Invalid file type dropped',
      'log.fileErr':     'Invalid file type, need .pt file',
      'log.newDetected': 'New model file detected — please re-upload',
      'log.modelSel':    name => `Model selected: ${name}`,
      'log.uploadStart': 'Starting model upload...',
      'log.verifying':   'Upload complete, verifying model...',
      'log.uploadFail':  msg => `Upload failed: ${msg}`,
      'log.uploadErr':   msg => `Upload error: ${msg}`,
      'log.verifyOk':    dev => `Model verified, ready (${dev})`,
      'log.verifyFail':  'Model not loaded — please re-upload',
      'log.connFail':    msg => `Connection failed: ${msg}`,
      'log.checkQuery':  'Checking server status...',
      'log.checkReady':  dev => `Model ready (${dev})`,
      'log.checkNone':   'Server has no model loaded',
      'log.inferSend':   'Sending inference request...',
      'log.inferDone':   (pred, conf) => `Done: ${pred} (confidence ${conf}%)`,
      'log.inferFail':   msg => `Inference failed: ${msg}`,
      'log.netErr':      msg => `Network error: ${msg}`,
      'status.selected': (name, size) => `Selected: ${name} (${size} MB) — click Upload Model`,
      'status.wrongType':'✗ Please select a .pt model file',
      'status.loaded':   (dev, cls) => `✓ Model loaded | Device: ${dev} | Classes: ${cls}`,
      'status.verifyFail':'Server reports model not loaded — re-upload required',
      'status.connFail': '✗ Cannot connect to server',
      'status.checkNone':'Model not loaded — please upload best.pt',
      'infer.fail':      msg => `Inference failed: ${msg}`,
      'infer.connFail':  'Connection failed — check server is running',
      'result.conf':     val => `Confidence: ${val}%`,
    }
  };

  let lang = localStorage.getItem('lang') || 'zh';

  function t(key, ...args) {
    const val = I18N[lang][key];
    if (val === undefined) return key;
    return typeof val === 'function' ? val(...args) : val;
  }

  function applyLang() {
    document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
    document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      const raw = I18N[lang][key];
      if (raw === undefined) return;
      const str = typeof raw === 'function' ? raw() : raw;
      if ('i18nHtml' in el.dataset) {
        el.innerHTML = str;
      } else {
        el.textContent = str;
      }
    });

    // Re-apply dynamic state text
    globalText.textContent = t(modelLoaded ? 'status.ready' : 'status.waiting');
    uploadLabel.textContent = t('btn.upload');
    inferLabel.textContent  = t('btn.infer');

    localStorage.setItem('lang', lang);
    renderLog();
  }

  // ── App state & elements ──────────────────────────────────────────────────
  const API = '';
  let modelLoaded = false;
  let imageFile   = null;

  const modelInput    = document.getElementById('model-file-input');
  const imageInput    = document.getElementById('image-file-input');
  const uploadBtn     = document.getElementById('upload-model-btn');
  const uploadSpinner = document.getElementById('upload-spinner');
  const uploadLabel   = document.getElementById('upload-label');
  const checkBtn      = document.getElementById('check-status-btn');
  const inferBtn      = document.getElementById('infer-btn');
  const clearBtn      = document.getElementById('clear-btn');
  const statusBar     = document.getElementById('model-status-bar');
  const globalBadge   = document.getElementById('global-status');
  const globalText    = document.getElementById('global-status-text');
  const previewImg    = document.getElementById('preview-img');
  const placeholder   = document.getElementById('image-placeholder');
  const resultPanel   = document.getElementById('result-panel');
  const inferSpinner  = document.getElementById('infer-spinner');
  const inferLabel    = document.getElementById('infer-label');
  const consoleLog    = document.getElementById('console-log');
  const inferError    = document.getElementById('infer-error');
  const modelCard     = document.getElementById('model-card');

  const logEntries = [];
  function log(key, type = 'info', ...args) {
    logEntries.push({ key, type, args, time: new Date().toLocaleTimeString('en-GB', {hour12: false}) });
    renderLog();
  }
  function renderLog() {
    consoleLog.innerHTML = '';
    logEntries.forEach(({ key, type, args, time }) => {
      const line = document.createElement('div');
      line.className = `log-line ${type}`;
      line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${t(key, ...args)}</span>`;
      consoleLog.appendChild(line);
    });
    consoleLog.scrollTop = consoleLog.scrollHeight;
  }

  function setStatus(msg, type) { statusBar.textContent = msg; statusBar.className = type; }

  function showInferError(msg) { inferError.textContent = msg; inferError.classList.add('visible'); }
  function clearInferError()   { inferError.textContent = ''; inferError.classList.remove('visible'); }

  function setModelLoaded(ready) {
    modelLoaded = ready;
    globalBadge.className  = ready ? 'status-badge ready' : 'status-badge';
    globalText.textContent = t(ready ? 'status.ready' : 'status.waiting');
    modelCard.classList.toggle('step-done', ready);
    updateInferBtn();
  }

  function updateInferBtn() {
    inferBtn.disabled = !(modelLoaded && imageFile);
  }

  function setUploadLoading(loading) {
    uploadBtn.disabled    = loading;
    checkBtn.disabled     = loading;
    uploadSpinner.style.display = loading ? 'block' : 'none';
    uploadLabel.textContent     = loading ? t('btn.uploading') : t('btn.upload');
  }

  // ── Model file select ─────────────────────────────────────────────────────
  modelInput.addEventListener('change', () => {
    const f = modelInput.files[0];
    if (!f) return;
    if (!f.name.endsWith('.pt')) {
      setStatus(t('status.wrongType'), 'error');
      log('log.fileErr', 'error');
      modelInput.value = '';
      return;
    }
    if (modelLoaded) {
      setModelLoaded(false);
      resultPanel.classList.remove('visible');
      log('log.newDetected', 'info');
    }
    uploadBtn.disabled = false;
    setStatus(t('status.selected', f.name, (f.size / 1024 / 1024).toFixed(2)), 'info');
    log('log.modelSel', 'info', f.name);
  });

  // ── Upload model ──────────────────────────────────────────────────────────
  uploadBtn.addEventListener('click', async () => {
    const f = modelInput.files[0];
    if (!f) return;
    setUploadLoading(true);
    setStatus(t('btn.uploading'), 'info');
    log('log.uploadStart');
    const fd = new FormData();
    fd.append('model', f);
    try {
      const res  = await fetch(`${API}/upload_model`, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        log('log.verifying', 'info');
        await verifyModelStatus();
      } else {
        setStatus('✗ ' + data.message, 'error');
        log('log.uploadFail', 'error', data.message);
        setModelLoaded(false);
      }
    } catch (e) {
      setStatus(t('status.connFail'), 'error');
      log('log.uploadErr', 'error', e.message);
    }
    setUploadLoading(false);
    uploadBtn.disabled = !modelInput.files[0];
  });

  // ── Verify / Check status ─────────────────────────────────────────────────
  async function verifyModelStatus() {
    try {
      const res  = await fetch(`${API}/model_status`);
      const data = await res.json();
      if (data.loaded) {
        setStatus(t('status.loaded', data.device, data.classes.join(', ')), 'success');
        log('log.verifyOk', 'success', data.device);
        setModelLoaded(true);
      } else {
        setStatus(t('status.verifyFail'), 'error');
        log('log.verifyFail', 'error');
        setModelLoaded(false);
      }
    } catch (e) {
      setStatus(t('status.connFail'), 'error');
      log('log.connFail', 'error', e.message);
      setModelLoaded(false);
    }
  }

  checkBtn.addEventListener('click', async () => {
    log('log.checkQuery');
    try {
      const res  = await fetch(`${API}/model_status`);
      const data = await res.json();
      if (data.loaded) {
        setStatus(t('status.loaded', data.device, data.classes.join(', ')), 'success');
        log('log.checkReady', 'success', data.device);
        setModelLoaded(true);
      } else {
        setStatus(t('status.checkNone'), 'info');
        log('log.checkNone');
        setModelLoaded(false);
      }
    } catch (e) {
      setStatus(t('status.connFail'), 'error');
      log('log.connFail', 'error', e.message);
    }
  });

  // ── Image select ──────────────────────────────────────────────────────────
  imageInput.addEventListener('change', () => {
    const f = imageInput.files[0];
    if (!f) return;
    imageFile = f;
    previewImg.src = URL.createObjectURL(f);
    previewImg.style.display = 'block';
    placeholder.style.display = 'none';
    resultPanel.classList.remove('visible');
    clearInferError();
    log('log.imgSelected', 'info', f.name);
    updateInferBtn();
  });

  // ── Drag & drop ───────────────────────────────────────────────────────────
  function setupDropZone(zone, input, validateFn) {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      const file  = e.dataTransfer.items[0];
      const valid = !validateFn || validateFn(file);
      zone.classList.toggle('drag-over',   valid);
      zone.classList.toggle('drag-reject', !valid);
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over', 'drag-reject'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over', 'drag-reject');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (validateFn && !validateFn(file)) { log('log.wrongDrop', 'error'); return; }
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      input.dispatchEvent(new Event('change'));
    });
  }

  setupDropZone(
    document.getElementById('model-drop-zone'), modelInput,
    f => f.name ? f.name.endsWith('.pt') : (f.type === '' || f.type === 'application/octet-stream')
  );
  setupDropZone(document.getElementById('image-drop-zone'), imageInput, null);

  // ── Inference ─────────────────────────────────────────────────────────────
  inferBtn.addEventListener('click', async () => {
    if (!imageFile || !modelLoaded) return;
    clearInferError();
    inferSpinner.style.display = 'block';
    inferLabel.textContent     = t('btn.inferring');
    inferBtn.disabled          = true;
    resultPanel.classList.remove('visible');
    log('log.inferSend');
    const fd = new FormData();
    fd.append('image', imageFile);
    try {
      const res  = await fetch(`${API}/predict`, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        showResult(data);
        log('log.inferDone', 'success', data.prediction, data.confidence);
      } else {
        showInferError(t('infer.fail', data.message));
        log('log.inferFail', 'error', data.message);
      }
    } catch (e) {
      showInferError(t('infer.connFail'));
      log('log.netErr', 'error', e.message);
    }
    inferSpinner.style.display = 'none';
    inferLabel.textContent     = t('btn.infer');
    inferBtn.disabled          = false;
  });

  function showResult(data) {
    const card  = document.getElementById('result-card');
    const emoji = document.getElementById('result-emoji');
    const cls   = document.getElementById('result-class');
    const conf  = document.getElementById('result-conf');
    const bars  = document.getElementById('prob-bars');
    const isFire = data.prediction === 'fire';
    card.className    = `result-card ${data.prediction}`;
    emoji.textContent = isFire ? '🔥' : '✅';
    cls.textContent   = isFire ? 'FIRE' : 'NON-FIRE';
    conf.textContent  = t('result.conf', data.confidence);
    bars.innerHTML = '';
    Object.entries(data.probabilities).forEach(([name, prob]) => {
      bars.innerHTML += `
        <div class="prob-row">
          <div class="prob-name">${name}</div>
          <div class="prob-track">
            <div class="prob-fill ${name}" style="width:0%" data-target="${prob}"></div>
          </div>
          <div class="prob-value">${prob}%</div>
        </div>`;
    });
    resultPanel.classList.add('visible');
    setTimeout(() => bars.querySelectorAll('.prob-fill').forEach(el => { el.style.width = el.dataset.target + '%'; }), 50);
  }

  // ── Clear ─────────────────────────────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    imageFile = null;
    imageInput.value = '';
    previewImg.style.display = 'none';
    placeholder.style.display = 'block';
    resultPanel.classList.remove('visible');
    clearInferError();
    updateInferBtn();
    log('log.cleared');
  });

  // ── Language toggle ───────────────────────────────────────────────────────
  document.getElementById('lang-btn').addEventListener('click', () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    applyLang();
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    applyLang();
    log('log.init');
  });
</script>
</body>
</html>
