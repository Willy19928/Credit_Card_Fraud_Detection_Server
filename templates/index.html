<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Detection — AI Inference Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4500;
    --fire-amber: #FFA500;
    --safe: #00C896;
    --bg: #0A0A0B;
    --surface: #111114;
    --border: #222228;
    --text: #E8E8EC;
    --muted: #555560;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative; z-index: 1;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--fire);
    box-shadow: 0 0 12px var(--fire);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform: scale(1); }
    50% { opacity:0.5; transform: scale(0.8); }
  }

  .status-badge {
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s;
  }
  .status-badge.ready {
    border-color: var(--safe);
    color: var(--safe);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px 40px;
    position: relative; z-index: 1;
  }

  .hero {
    margin-bottom: 60px;
  }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--fire); }
  .hero p {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #333340; }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-label::before {
    content: ''; display: block;
    width: 16px; height: 1px;
    background: var(--muted);
  }

  /* ── Upload zones ── */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--fire);
    background: rgba(255,69,0,0.04);
  }

  .upload-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }
  .upload-zone h3 {
    font-family: var(--display);
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .upload-zone p {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.5;
  }

  input[type="file"] { display: none; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center; gap: 8px;
    padding: 12px 24px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    background: var(--fire);
    color: #fff;
    border-color: var(--fire);
  }
  .btn-primary:hover { background: #e03d00; }
  .btn-primary:disabled {
    opacity: 0.3; cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: #444; }

  .btn-row {
    display: flex; gap: 10px;
    margin-top: 18px;
  }

  /* ── Model status bar ── */
  #model-status-bar {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.72rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.3s;
    display: none;
  }
  #model-status-bar.success {
    border-color: var(--safe);
    color: var(--safe);
    background: rgba(0,200,150,0.05);
    display: block;
  }
  #model-status-bar.error {
    border-color: var(--fire);
    color: #ff7755;
    background: rgba(255,69,0,0.05);
    display: block;
  }
  #model-status-bar.info {
    border-color: var(--border);
    color: var(--muted);
    display: block;
  }

  /* ── Image preview ── */
  #image-preview-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d10;
    position: relative;
  }
  #image-preview-box img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #image-placeholder {
    text-align: center; color: var(--muted);
    font-size: 0.72rem; line-height: 1.8;
  }
  #image-placeholder span { font-size: 2rem; display: block; margin-bottom: 8px; }

  /* ── Result panel ── */
  #result-panel {
    display: none;
    margin-top: 20px;
  }
  #result-panel.visible { display: block; }

  .result-card {
    border-radius: 12px;
    padding: 30px;
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: center;
  }
  .result-card.fire {
    background: rgba(255,69,0,0.06);
    border-color: rgba(255,69,0,0.3);
  }
  .result-card.non-fire {
    background: rgba(0,200,150,0.06);
    border-color: rgba(0,200,150,0.3);
  }

  .result-emoji {
    font-size: 3.5rem;
    line-height: 1;
  }

  .result-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .result-class {
    font-family: var(--display);
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-card.fire .result-class { color: var(--fire); }
  .result-card.non-fire .result-class { color: var(--safe); }

  .result-conf {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Probability bars ── */
  .prob-bars { display: flex; flex-direction: column; gap: 8px; }
  .prob-row {
    display: grid;
    grid-template-columns: 80px 1fr 52px;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
  }
  .prob-name { color: var(--muted); }
  .prob-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .prob-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .prob-fill.fire { background: var(--fire); }
  .prob-fill.non-fire { background: var(--safe); }
  .prob-value { text-align: right; color: var(--text); }

  /* ── Loading spinner ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Log console ── */
  #console-log {
    background: #080809;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 0.68rem;
    color: var(--muted);
    height: 120px;
    overflow-y: auto;
    margin-top: 20px;
    line-height: 1.8;
  }
  .log-line { display: flex; gap: 10px; }
  .log-time { color: #333340; flex-shrink: 0; }
  .log-line.success .log-msg { color: var(--safe); }
  .log-line.error .log-msg { color: #ff7755; }
  .log-line.info .log-msg { color: var(--muted); }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    header { padding: 16px 20px; }
    main { padding: 30px 20px; }
    .grid { grid-template-columns: 1fr; }
    .result-card { grid-template-columns: 1fr; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    FIRE DETECTION LAB
  </div>
  <div class="status-badge" id="global-status">
    <div class="status-dot"></div>
    <span id="global-status-text">等待模型載入</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1>AI <span>Fire</span> Detection<br>推論測試平台</h1>
    <p>MobileNetV2 · PyTorch · Azure Inference Service</p>
  </div>

  <div class="grid">
    <!-- Step 1: Upload Model -->
    <div class="card">
      <div class="card-label">Step 01 — 上傳模型</div>

      <label class="upload-zone" id="model-drop-zone" for="model-file-input">
        <span class="upload-icon">⚙️</span>
        <h3>拖曳或點擊上傳 best.pt</h3>
        <p>從 Google Colab 訓練完成後<br>導出的 MobileNetV2 權重檔案</p>
      </label>
      <input type="file" id="model-file-input" accept=".pt">

      <div id="model-status-bar"></div>

      <div class="btn-row">
        <button class="btn btn-ghost" id="upload-model-btn" disabled>
          <span>📤</span> 上傳模型
        </button>
        <button class="btn btn-ghost" id="check-status-btn">
          <span>🔍</span> 檢查狀態
        </button>
      </div>
    </div>

    <!-- Step 2: Upload Image -->
    <div class="card">
      <div class="card-label">Step 02 — 選擇測試圖片</div>

      <label class="upload-zone" id="image-drop-zone" for="image-file-input">
        <div id="image-preview-box">
          <div id="image-placeholder">
            <span>🖼️</span>
            拖曳或點擊上傳圖片<br>支援 JPG / PNG
          </div>
          <img id="preview-img" style="display:none">
        </div>
      </label>
      <input type="file" id="image-file-input" accept="image/*">

      <div class="btn-row">
        <button class="btn btn-primary" id="infer-btn" disabled>
          <div class="spinner" id="infer-spinner"></div>
          <span id="infer-label">🔥 開始推論</span>
        </button>
        <button class="btn btn-ghost" id="clear-btn">清除</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result-panel">
    <div class="card-label">推論結果</div>
    <div class="result-card" id="result-card">
      <div class="result-emoji" id="result-emoji">—</div>
      <div>
        <div class="result-label">預測類別</div>
        <div class="result-class" id="result-class">—</div>
        <div class="result-conf" id="result-conf">—</div>
        <div class="prob-bars" id="prob-bars"></div>
      </div>
    </div>
  </div>

  <!-- Console -->
  <div id="console-log"></div>
</main>

<script>
  const API = ''; // 相對路徑，部署時自動對應

  // ── State ──
  let modelLoaded = false;
  let imageFile = null;

  // ── Elements ──
  const modelInput   = document.getElementById('model-file-input');
  const imageInput   = document.getElementById('image-file-input');
  const uploadBtn    = document.getElementById('upload-model-btn');
  const checkBtn     = document.getElementById('check-status-btn');
  const inferBtn     = document.getElementById('infer-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const statusBar    = document.getElementById('model-status-bar');
  const globalBadge  = document.getElementById('global-status');
  const globalText   = document.getElementById('global-status-text');
  const previewImg   = document.getElementById('preview-img');
  const placeholder  = document.getElementById('image-placeholder');
  const resultPanel  = document.getElementById('result-panel');
  const spinner      = document.getElementById('infer-spinner');
  const inferLabel   = document.getElementById('infer-label');
  const consoleLog   = document.getElementById('console-log');

  // ── Logger ──
  function log(msg, type = 'info') {
    const now = new Date().toLocaleTimeString('zh-TW', {hour12: false});
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg">${msg}</span>`;
    consoleLog.appendChild(line);
    consoleLog.scrollTop = consoleLog.scrollHeight;
  }

  function setStatus(msg, type) {
    statusBar.textContent = msg;
    statusBar.className = type;
  }

  function setGlobal(ready) {
    modelLoaded = ready;
    if (ready) {
      globalBadge.className = 'status-badge ready';
      globalText.textContent = '模型已就緒';
    } else {
      globalBadge.className = 'status-badge';
      globalText.textContent = '等待模型載入';
    }
    updateInferBtn();
  }

  function updateInferBtn() {
    inferBtn.disabled = !(modelLoaded && imageFile);
  }

  // ── Model file selection ──
  modelInput.addEventListener('change', () => {
    const f = modelInput.files[0];
    if (!f) return;
    uploadBtn.disabled = false;
    setStatus(`已選擇：${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`, 'info');
    log(`選擇模型檔案：${f.name}`);
  });

  // ── Upload model ──
  uploadBtn.addEventListener('click', async () => {
    const f = modelInput.files[0];
    if (!f) return;
    uploadBtn.disabled = true;
    setStatus('上傳中...', 'info');
    log('開始上傳模型...');

    const fd = new FormData();
    fd.append('model', f);

    try {
      const res = await fetch(`${API}/upload_model`, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        setStatus('✓ ' + data.message, 'success');
        log('模型載入成功', 'success');
        setGlobal(true);
      } else {
        setStatus('✗ ' + data.message, 'error');
        log('模型載入失敗：' + data.message, 'error');
        setGlobal(false);
      }
    } catch (e) {
      setStatus('✗ 網路錯誤', 'error');
      log('上傳錯誤：' + e.message, 'error');
    }
    uploadBtn.disabled = false;
  });

  // ── Check server status ──
  checkBtn.addEventListener('click', async () => {
    log('查詢伺服器狀態...');
    try {
      const res = await fetch(`${API}/model_status`);
      const data = await res.json();
      if (data.loaded) {
        setStatus(`✓ 模型已載入 | 裝置：${data.device} | 類別：${data.classes.join(', ')}`, 'success');
        log(`模型已就緒 (${data.device})`, 'success');
        setGlobal(true);
      } else {
        setStatus('模型尚未載入', 'info');
        log('伺服器尚未載入模型');
        setGlobal(false);
      }
    } catch(e) {
      setStatus('✗ 無法連線至伺服器', 'error');
      log('伺服器連線失敗：' + e.message, 'error');
    }
  });

  // ── Image selection ──
  imageInput.addEventListener('change', () => {
    const f = imageInput.files[0];
    if (!f) return;
    imageFile = f;
    const url = URL.createObjectURL(f);
    previewImg.src = url;
    previewImg.style.display = 'block';
    placeholder.style.display = 'none';
    resultPanel.classList.remove('visible');
    log(`已選擇圖片：${f.name}`);
    updateInferBtn();
  });

  // ── Drag & drop ──
  ['model-drop-zone', 'image-drop-zone'].forEach(id => {
    const zone = document.getElementById(id);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (id === 'model-drop-zone') {
        const dt = new DataTransfer(); dt.items.add(file);
        modelInput.files = dt.files;
        modelInput.dispatchEvent(new Event('change'));
      } else {
        const dt = new DataTransfer(); dt.items.add(file);
        imageInput.files = dt.files;
        imageInput.dispatchEvent(new Event('change'));
      }
    });
  });

  // ── Inference ──
  inferBtn.addEventListener('click', async () => {
    if (!imageFile || !modelLoaded) return;

    spinner.style.display = 'block';
    inferLabel.textContent = '推論中...';
    inferBtn.disabled = true;
    resultPanel.classList.remove('visible');
    log('發送推論請求...');

    const fd = new FormData();
    fd.append('image', imageFile);

    try {
      const res = await fetch(`${API}/predict`, { method: 'POST', body: fd });
      const data = await res.json();

      if (data.success) {
        showResult(data);
        log(`推論完成：${data.prediction}（信心度 ${data.confidence}%）`, 'success');
      } else {
        log('推論失敗：' + data.message, 'error');
        alert('推論錯誤：' + data.message);
      }
    } catch(e) {
      log('網路錯誤：' + e.message, 'error');
      alert('連線失敗：' + e.message);
    }

    spinner.style.display = 'none';
    inferLabel.textContent = '🔥 開始推論';
    inferBtn.disabled = false;
  });

  function showResult(data) {
    const card     = document.getElementById('result-card');
    const emoji    = document.getElementById('result-emoji');
    const cls      = document.getElementById('result-class');
    const conf     = document.getElementById('result-conf');
    const bars     = document.getElementById('prob-bars');

    const isFire = data.prediction === 'fire';
    card.className = `result-card ${data.prediction}`;
    emoji.textContent = isFire ? '🔥' : '✅';
    cls.textContent = isFire ? 'FIRE' : 'NON-FIRE';
    conf.textContent = `信心度：${data.confidence}%`;

    bars.innerHTML = '';
    Object.entries(data.probabilities).forEach(([name, prob]) => {
      const cls2 = name.replace('-', '');
      bars.innerHTML += `
        <div class="prob-row">
          <div class="prob-name">${name}</div>
          <div class="prob-track">
            <div class="prob-fill ${cls2}" style="width:0%" data-target="${prob}"></div>
          </div>
          <div class="prob-value">${prob}%</div>
        </div>`;
    });

    resultPanel.classList.add('visible');
    setTimeout(() => {
      bars.querySelectorAll('.prob-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    }, 50);
  }

  // ── Clear ──
  clearBtn.addEventListener('click', () => {
    imageFile = null;
    imageInput.value = '';
    previewImg.style.display = 'none';
    placeholder.style.display = 'block';
    resultPanel.classList.remove('visible');
    updateInferBtn();
    log('已清除');
  });

  // ── Auto-check on load ──
  window.addEventListener('load', () => {
    log('系統初始化完成');
    checkBtn.click();
  });
</script>
</body>
</html>
